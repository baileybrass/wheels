<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Circle of Fifths Roulette - Bailey Brass</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            box-sizing: border-box;
            padding: 10px;
        }
        
        .wheel-container {
            position: relative;
            width: 85vw;  
            height: 85vw; 
            max-width: 460px; 
            max-height: 460px;
            margin-bottom: 25px;
            margin-top: 40px; 
        }
        
        /* Trumpet Shape Pointer */
        .trumpet-pointer {
            position: absolute;
            top: -42px; 
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 55px;
            z-index: 20; 
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.6));
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }
        .trumpet-bell {
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid #eab308; 
        }
        .trumpet-body {
            width: 8px;
            height: 18px;
            background-color: #eab308;
            margin-top: -2px;
            position: relative;
        }
        .trumpet-valves {
            position: absolute;
            top: -5px;
            left: -4px;
            width: 16px;
            height: 4px;
            background-color: #ca8a04;
            border-radius: 2px;
        }
        
        .rotating-wheel-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 50%;
            box-shadow: 0 0 35px rgba(0, 0, 0, 0.8), 0 0 15px rgba(37, 99, 235, 0.2);
            cursor: grab;
        }
        .rotating-wheel-wrapper:active {
            cursor: grabbing;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: block;
        }

        .center-hub {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 18vw;
            max-width: 85px;
            height: 18vw;
            max-height: 85px;
            background: radial-gradient(circle, #2d2d2d, #141414);
            border: 3px solid #ffffff; 
            border-radius: 50%;
            z-index: 5;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            pointer-events: none;
        }
        .hub-logo-img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            border-radius: 50%;
        }

        .spin-btn {
            background: linear-gradient(45deg, #1e1b4b, #2563eb, #111827); 
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 40px;
            font-size: 18px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .spin-btn:active {
            transform: scale(0.95);
        }
        
        #resultBox {
            margin-top: 20px;
            height: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        #result {
            font-size: 24px; 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            color: #ffffff;
        }
        #formula {
            font-size: 16px; 
            color: #3b82f6; 
            font-weight: bold;
            margin-top: 6px;
            letter-spacing: 1.2px;
        }
    </style>
</head>
<body>

    <div class="wheel-container">
        <div class="trumpet-pointer">
            <div class="trumpet-body">
                <div class="trumpet-valves"></div>
            </div>
            <div class="trumpet-bell"></div>
        </div>
        
        <div class="center-hub">
            <img src="logo.png" alt="Bailey Brass Logo" class="hub-logo-img" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%220.9em%22 font-size=%2280%22>🎺</text></svg>';">
        </div>
        
        <div id="wheelWrapper" class="rotating-wheel-wrapper">
            <canvas id="wheel" width="600" height="600"></canvas>
        </div>
    </div>

    <button class="spin-btn" id="spinBtn">Spin</button>
    
    <div id="resultBox">
        <div id="result">Ready to Play!</div>
        <div id="formula"></div>
    </div>

    <script>
        // Formatted cleanly clockwise following the sequence of fifths
        const scalesList = [
            "C", "G", "D", "A", "E", "B", "F♯ / G♭", "D♯ / E♭", "A♭", "E♭", "B♭", "F"
        ];

        const formulaDictionary = {
            "C": "Natural (No Sharps or Flats)",
            "G": "1 Sharp (F♯)",
            "D": "2 Sharps (F♯, C♯)",
            "A": "3 Sharps (F♯, C♯, G♯)",
            "E": "4 Sharps (F♯, C♯, G♯, D♯)",
            "B": "5 Sharps (F♯, C♯, G♯, D♯, A♯)",
            "F♯ / G♭": "6 Sharps (F♯...) or 6 Flats (B♭...)",
            "D♯ / E♭": "5 Flats (B♭, E♭, A♭, D♭, G♭)",
            "A♭": "4 Flats (B♭, E♭, A♭, D♭)",
            "E♭": "3 Flats (B♭, E♭, A♭)",
            "B♭": "2 Flats (B♭, E♭)",
            "F": "1 Flat (B♭)"
        };

        const wrapper = document.getElementById("wheelWrapper");
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const resultDiv = document.getElementById("result");
        const formulaDiv = document.getElementById("formula");

        const numSegments = scalesList.length;
        const segmentAngle = (2 * Math.PI) / numSegments;
        
        let currentRotationRadians = 0; 
        let isSpinning = false;
        let isDragging = false;
        let startAngle = 0;

        function getSliceStyle(index) {
            const pattern = index % 3;
            if (pattern === 0) return { bg: "#0f172a", text: "#ffffff" }; 
            if (pattern === 1) return { bg: "#f8fafc", text: "#0f172a" }; 
            return { bg: "#2563eb", text: "#ffffff" }; 
        }

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const radius = canvas.width / 2;

            // Step 1: Background Wedges
            for (let i = 0; i < numSegments; i++) {
                const angle = (i * segmentAngle) - (Math.PI / 2) + currentRotationRadians;
                const style = getSliceStyle(i);
                
                ctx.beginPath();
                ctx.fillStyle = style.bg;
                ctx.moveTo(radius, radius);
                ctx.arc(radius, radius, radius, angle, angle + segmentAngle);
                ctx.lineTo(radius, radius);
                ctx.fill();

                ctx.beginPath();
                ctx.strokeStyle = "#121212";
                ctx.lineWidth = 3;
                ctx.moveTo(radius, radius);
                ctx.lineTo(radius + radius * Math.cos(angle), radius + radius * Math.sin(angle));
                ctx.stroke();
            }

            // Step 2: Anti-Inversion Upright Text
            for (let i = 0; i < numSegments; i++) {
                const style = getSliceStyle(i);
                const midAngle = (i * segmentAngle) - (Math.PI / 2) + (segmentAngle / 2) + currentRotationRadians;
                
                // Adjusted radius modifier slightly to keep 12 compact wedges completely balanced
                const textDistance = radius * 0.72; 
                const textX = radius + textDistance * Math.cos(midAngle);
                const textY = radius + textDistance * Math.sin(midAngle);
                
                ctx.save();
                ctx.translate(textX, textY);
                ctx.rotate(0); 
                
                ctx.fillStyle = style.text;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.font = "bold 20px 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
                
                ctx.fillText(scalesList[i], 0, 0);
                ctx.restore();
            }

            // Outer Boundary Ring
            ctx.beginPath();
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 6;
            ctx.arc(radius, radius, radius - 3, 0, 2 * Math.PI);
            ctx.stroke();
        }

        function calculateCurrentSelection(rad) {
            let deg = rad * (180 / Math.PI);
            let normalized = (deg % 360);
            if (normalized < 0) normalized += 360;

            const wedgeDegrees = 360 / numSegments;
            const winningIndex = Math.floor((360 - normalized) / wedgeDegrees) % numSegments;
            
            const winningScale = scalesList[winningIndex];
            const scaleFormula = formulaDictionary[winningScale] || "";
            
            resultDiv.innerHTML = `🎉 Concert Key: ${winningScale}`;
            formulaDiv.innerHTML = `${scaleFormula}`;
        }

        // ==================== ANIMATION CONFIGURATION ====================
        spinBtn.addEventListener("click", () => {
            if (isSpinning || isDragging) return;
            isSpinning = true;
            
            resultDiv.innerText = "🎺 Selecting Key Signature...";
            formulaDiv.innerText = ""; 

            const targetIndex = Math.floor(Math.random() * numSegments);
            const wedgeDegrees = 360 / numSegments;
            const targetSliceCenterDegrees = (targetIndex * wedgeDegrees) + (wedgeDegrees / 2);
            const precisionStopDegrees = 360 - targetSliceCenterDegrees;
            const extraRotations = 360 * (Math.floor(Math.random() * 3) + 4); 
            
            const totalTargetDegrees = extraRotations + precisionStopDegrees;
            const targetRadians = totalTargetDegrees * (Math.PI / 180);
            
            const startRad = currentRotationRadians;
            const deltaRad = targetRadians - (startRad % (2 * Math.PI)) + (2 * Math.PI * 2); 
            
            const duration = 5000; 
            const startTime = performance.now();

            function easeOutCubic(x) {
                return 1 - Math.pow(1 - x, 3);
            }

            function animate(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easedProgress = easeOutCubic(progress);
                
                currentRotationRadians = startRad + deltaRad * easedProgress;
                drawWheel();

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    calculateCurrentSelection(currentRotationRadians);
                }
            }
            requestAnimationFrame(animate);
        });

        // ==================== INTERACTION LOGIC ====================
        function getUnifiedAngleRadian(event) {
            const rect = wrapper.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;
            return Math.atan2(clientY - centerY, clientX - centerX);
        }

        function handlePointerDown(e) {
            if (isSpinning) return; 
            isDragging = true;
            startAngle = getUnifiedAngleRadian(e) - currentRotationRadians;
        }

        function handlePointerMove(e) {
            if (!isDragging) return;
            if (e.cancelable) e.preventDefault(); 
            currentRotationRadians = getUnifiedAngleRadian(e) - startAngle;
            drawWheel();
            calculateCurrentSelection(currentRotationRadians);
        }

        function handlePointerUp() {
            if (!isDragging) return;
            isDragging = false;

            const wedgeSizeRad = (2 * Math.PI) / numSegments;
            let normalized = currentRotationRadians % (2 * Math.PI);
            if (normalized < 0) normalized += (2 * Math.PI);
            
            const currentWedgeIndex = Math.floor(((2 * Math.PI) - normalized) / wedgeSizeRad) % numSegments;
            const alignedTargetRadians = (2 * Math.PI) - ((currentWedgeIndex * wedgeSizeRad) + (wedgeSizeRad / 2));
            const baseRotations = Math.floor(currentRotationRadians / (2 * Math.PI)) * (2 * Math.PI);
            
            currentRotationRadians = baseRotations + alignedTargetRadians;
            
            drawWheel();
            calculateCurrentSelection(currentRotationRadians);
        }

        wrapper.addEventListener("mousedown", handlePointerDown);
        window.addEventListener("mousemove", handlePointerMove);
        window.addEventListener("mouseup", handlePointerUp);

        wrapper.addEventListener("touchstart", handlePointerDown, { passive: false });
        window.addEventListener("touchmove", handlePointerMove, { passive: false });
        window.addEventListener("touchend", handlePointerUp);

        drawWheel();
    </script>
</body>
</html>
