<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bailey Brass - Precision Plinko</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 20px 10px;
            user-select: none;
        }

        h1 {
            margin: 0 0 5px 0;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 26px;
            text-align: center;
            background: linear-gradient(45deg, #2563eb, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .plinko-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a;
            border: 3px solid #2563eb; 
            border-radius: 20px;
            padding: 20px 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(37, 99, 235, 0.15);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        /* Action Drop Button Interface */
        .drop-action-btn {
            background: linear-gradient(45deg, #2563eb, #1d4ed8);
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 0;
            width: 100%;
            font-size: 18px;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            transition: transform 0.05s, background 0.2s, box-shadow 0.2s;
        }
        .drop-action-btn:active {
            transform: scale(0.98);
        }
        .drop-action-btn:hover {
            background: linear-gradient(45deg, #3b82f6, #2563eb);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
        }

        .board-container {
            position: relative;
            width: 100%;
            background-color: #060b18;
            border: 4px solid #ffffff;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
        }
        
        .result-readout {
            margin-top: 10px;
            height: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
        }
        .main-status {
            font-size: 22px; 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            color: #ffffff;
        }
        .sub-description {
            font-size: 15px; 
            color: #60a5fa; 
            font-weight: bold;
            margin-top: 5px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <h1>Plinko Key Picker</h1>
    <div class="subtitle">Bailey Brass Edition</div>

    <div class="plinko-panel">
        <button class="drop-action-btn" id="dropActionBtn">Drop Coin</button>
        
        <div class="board-container">
            <canvas id="plinkoBoard" width="500" height="640"></canvas>
        </div>
        
        <div class="result-readout">
            <div id="statusOutput" class="main-status">Time Your Drop!</div>
            <div id="descOutput" class="sub-description"></div>
        </div>
    </div>

    <script>
        const slotsList = [
            "C", "G", "D", "A", "E", "B", "F♯", "E♭", "A♭", "B♭", "F"
        ];
        
        const keyFormulas = {
            "C": "Natural (No Sharps or Flats)", "G": "1 Sharp (F♯)", "D": "2 Sharps (F♯, C♯)",
            "A": "3 Sharps (F♯, C♯, G♯)", "E": "4 Sharps (F♯, C♯, G♯, D♯)", "B": "5 Sharps (F♯, C♯, G♯, D♯, A♯)",
            "F♯": "6 Sharps (F♯, C♯, G♯, D♯, A♯, E♯)", "E♭": "3 Flats (B♭, E♭, A♭)", 
            "A♭": "4 Flats (B♭, E♭, A♭, D♭)", "B♭": "2 Flats (B♭, E♭)", "F": "1 Flat (B♭)"
        };

        const canvas = document.getElementById("plinkoBoard");
        const ctx = canvas.getContext("2d");
        const dropActionBtn = document.getElementById("dropActionBtn");
        const statusOutput = document.getElementById("statusOutput");
        const descOutput = document.getElementById("descOutput");

        // Physics Configuration Values
        const gravity = 0.38;     
        const bounceLossX = 0.65; 
        const bounceLossY = 0.50; 
        const tokenRadius = 9;    
        const pinRadius = 4.5;

        const rows = 16;          
        const rowSpacing = 26;    
        const pins = [];
        const numSlots = slotsList.length;
        const slotWidth = canvas.width / numSlots;
        
        const slotHeight = 120; 
        const bottomY = canvas.height - slotHeight; 

        const horizontalSpacing = 42; 
        
        for (let r = 0; r < rows; r++) {
            const y = 85 + r * rowSpacing;
            const isWideRow = r % 2 === 0;
            
            const pinCount = isWideRow ? 11 : 10;
            const totalRowWidth = (pinCount - 1) * horizontalSpacing;
            const startX = (canvas.width - totalRowWidth) / 2;

            for (let p = 0; p < pinCount; p++) {
                const x = startX + p * horizontalSpacing;
                pins.push({ x, y });
            }

            if (r % 2 === 1) {
                pins.push({ x: 10, y: y });
                pins.push({ x: canvas.width - 10, y: y });
            }
        }

        // State Machine Vectors
        let token = null;
        let isDropping = false;
        
        // Horizontal Slider Loop Constants
        let slideX = canvas.width / 2;
        let slideSpeed = 4.5; // Controls swift horizontal translation velocity
        let slideDirection = 1; 

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Shaded Alternating Core Slate Palette Slots
            for (let i = 0; i < numSlots; i++) {
                const xLeft = i * slotWidth;
                
                if (i > 0) {
                    ctx.beginPath();
                    ctx.strokeStyle = "#4a5568";
                    ctx.lineWidth = 3;
                    ctx.moveTo(xLeft, bottomY);
                    ctx.lineTo(xLeft, canvas.height);
                    ctx.stroke();
                }

                ctx.fillStyle = i % 2 === 0 ? "#0f172a" : "#1e293b";
                ctx.fillRect(xLeft, bottomY, slotWidth, slotHeight);

                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 18px 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(slotsList[i], xLeft + slotWidth / 2, canvas.height - (slotHeight / 2));
            }

            // 2. Draw Pins
            pins.forEach(pin => {
                ctx.beginPath();
                ctx.arc(pin.x, pin.y, pinRadius, 0, 2 * Math.PI);
                ctx.fillStyle = "#2563eb"; 
                ctx.fill();
                ctx.strokeStyle = "#60a5fa";
                ctx.lineWidth = 1.2;
                ctx.stroke();
            });

            // 3. Render Floating Top Track Aim Guide
            if (!isDropping) {
                ctx.beginPath();
                ctx.arc(slideX, 25, tokenRadius, 0, 2 * Math.PI);
                ctx.fillStyle = "rgba(37, 99, 235, 0.25)";
                ctx.fill();
                ctx.strokeStyle = "#2563eb";
                ctx.setLineDash([4, 4]);
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(slideX, 37);
                ctx.lineTo(slideX, 65);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // 4. Draw Active/Parked Plinko Chip Instance
            if (token) {
                ctx.beginPath();
                ctx.arc(token.x, token.y, tokenRadius, 0, 2 * Math.PI);
                
                const gradient = ctx.createRadialGradient(token.x, token.y, 2, token.x, token.y, tokenRadius);
                gradient.addColorStop(0, "#60a5fa");
                gradient.addColorStop(0.7, "#1d4ed8");
                gradient.addColorStop(1, "#1e3a8a");
                
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(token.x, token.y, tokenRadius * 0.4, 0, 2 * Math.PI);
                ctx.strokeStyle = "rgba(255,255,255,0.6)";
                ctx.stroke();
            }

            // Upper limit track barrier edge
            ctx.beginPath();
            ctx.strokeStyle = "#2563eb";
            ctx.lineWidth = 3;
            ctx.moveTo(0, 70);
            ctx.lineTo(canvas.width, 70);
            ctx.stroke();
        }

        function updateSimulation() {
            if (!isDropping) {
                // Handle sliding math when engine idle
                slideX += slideSpeed * slideDirection;
                
                // Reverse directions when kissing left/right boundaries
                if (slideX - tokenRadius <= 12) {
                    slideX = tokenRadius + 12;
                    slideDirection = 1;
                } else if (slideX + tokenRadius >= canvas.width - 12) {
                    slideX = canvas.width - tokenRadius - 12;
                    slideDirection = -1;
                }
            } else if (token && !token.isParked) {
                // Handle Falling Physics
                token.vy += gravity;
                token.x += token.vx;
                token.y += token.vy;

                // Side Wall Bounds checks
                if (token.x - tokenRadius < 4) {
                    token.x = tokenRadius + 4;
                    token.vx *= -bounceLossX; 
                } else if (token.x + tokenRadius > canvas.width - 4) {
                    token.x = canvas.width - tokenRadius - 4;
                    token.vx *= -bounceLossX;
                }

                // Node Intersections checks
                if (token.y < bottomY + 5) {
                    pins.forEach(pin => {
                        const dx = token.x - pin.x;
                        const dy = token.y - pin.y;
                        const distance = Math.hypot(dx, dy);
                        const minDistance = tokenRadius + pinRadius;

                        if (distance < minDistance) {
                            const nx = dx / distance;
                            const ny = dy / distance;

                            token.x = pin.x + nx * minDistance;
                            token.y = pin.y + ny * minDistance;

                            const p = 2 * (token.vx * nx + token.vy * ny);
                            token.vx = (token.vx - p * nx) * bounceLossX;
                            token.vy = (token.vy - p * ny) * bounceLossY;

                            token.vx += (Math.random() - 0.5) * 0.55;
                        }
                    });
                } else {
                    // Deep Slot Wall frictions
                    let slotIndex = Math.floor(token.x / slotWidth);
                    let wallLeft = slotIndex * slotWidth;
                    let wallRight = wallLeft + slotWidth;

                    if (token.x - tokenRadius < wallLeft + 3) {
                        token.x = wallLeft + tokenRadius + 3;
                        token.vx *= -0.15; 
                    } else if (token.x + tokenRadius > wallRight - 3) {
                        token.x = wallRight - tokenRadius - 3;
                        token.vx *= -0.15;
                    }
                }

                // Ground landing resolution
                if (token.y + tokenRadius >= canvas.height - 4) {
                    token.y = canvas.height - tokenRadius - 4;
                    token.vx = 0;
                    token.vy = 0;
                    token.isParked = true;
                    isDropping = false;
                    dropActionBtn.innerText = "Reset Board";

                    let winIndex = Math.floor(token.x / slotWidth);
                    if (winIndex < 0) winIndex = 0;
                    if (winIndex >= numSlots) winIndex = numSlots - 1;

                    const selectedKey = slotsList[winIndex];
                    statusOutput.innerHTML = `🎉 Concert Key: ${selectedKey}`;
                    descOutput.innerHTML = keyFormulas[selectedKey];
                }
            }
        }

        function globalEngineLoop() {
            updateSimulation();
            drawBoard();
            requestAnimationFrame(globalEngineLoop);
        }

        // Primary Action Controller Input Trigger Handler
        function triggerMainAction() {
            if (isDropping) return; // Prevent double-triggering mid-flight

            if (token && token.isParked) {
                // RESET STATE MACHINE CYCLE
                token = null;
                statusOutput.innerText = "Time Your Drop!";
                descOutput.innerText = "";
                dropActionBtn.innerText = "Drop Coin";
            } else {
                // DROP COIN CYCLE
                statusOutput.innerText = "🚨 Chip in play!";
                descOutput.innerText = "";
                
                token = {
                    x: slideX,
                    y: 25,
                    vx: (Math.random() - 0.5) * 1.5, 
                    vy: 0,
                    isParked: false
                };
                isDropping = true;
            }
        }

        dropActionBtn.addEventListener("click", triggerMainAction);

        // Map Spacebar keypress to trigger button for comfortable desktop running
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                e.preventDefault();
                triggerMainAction();
            }
        });

        // Initialize frame sequencing loops
        globalEngineLoop();
    </script>
</body>
</html>
